<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Sara ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= Intro ================= -->

<div id="intro">

    <div class="intro-card">

        <h1>💖 Especially For Sara 💖</h1>

        <p>Made With All My Love ❤️</p>

    </div>

</div>

<!-- ================= Floating Hearts ================= -->

<div id="hearts"></div>

<!-- ================= Music ================= -->

<audio id="bgMusic" loop>

    <source src="ميوزك.mp3" type="audio/mpeg">

</audio>

<button id="musicBtn">

    🔊

</button>

<!-- ================= Main ================= -->

<div class="container">

    <div class="question-container">

        <div class="media-frame">

            <video

                class="local-gif"

                autoplay

                muted

                loop

                playsinline>

                <source src="Reply me love.mp4" type="video/mp4">

            </video>

            <button

                class="btn no-btn js-no-btn">

                NO 😅

            </button>

        </div>

        <h2>

            Do You Love Me Sara? ❤️

        </h2>

        <div class="button-container">

            <button

                class="btn yes-btn js-yes-btn">

                YES 💖

            </button>

        </div>

    </div>

    <!-- ================= Result ================= -->

    <div class="result-container">

        <video

            id="resultVideo"

            class="gif-result"

            autoplay

            muted

            loop

            playsinline>

            <source src="Love me.mp4" type="video/mp4">

        </video>

        <h2>

            I Knew It ❤️🥰

        </h2>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
